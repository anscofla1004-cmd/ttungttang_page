<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐣뚱땅하면 변환 끗🐥</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --main: #007bff; --dark: #003366; --green: #28a745; }
        body { font-family: 'Pretendard', sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { width: 100%; max-width: 850px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        h1 { color: var(--dark); text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        .drop-zone { border: 2px dashed var(--main); background: #f0f7ff; padding: 40px; border-radius: 15px; text-align: center; cursor: pointer; }
        #result { width: 100%; height: 350px; margin-top: 20px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; line-height: 1.8; resize: none; outline: none; }
        .progress-box { display: none; margin: 15px 0; }
        .bar-bg { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--main); transition: 0.2s; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; background: var(--main); transition: 0.2s; }
        .btn-ai { background: var(--green); grid-column: span 2; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        .btn-word { background: var(--dark); }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .history-item { background: #fff; padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>🐣뚱땅하면 변환 끗🐥</h1>
    <p class="subtitle">파일에서 글자를 읽고 AI가 완벽하게 교정해줘요.</p>

    <div class="container">
        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>📄 여기에 이미지나 PDF를 업로드해 주세요</p>
            <input type="file" id="file-input" hidden accept="image/*, application/pdf">
        </div>

        <div class="progress-box" id="progress-box">
            <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
            <p id="status" style="text-align:center; font-size:13px; color:#777; margin-top:8px;">준비 중...</p>
        </div>

        <textarea id="result" placeholder="변환된 결과가 여기에 표시됩니다."></textarea>

        <div class="btn-group">
            <button class="btn-ai" onclick="fixSpacingWithAI()">✨ AI 띄어쓰기 정밀 교정 (필수!)</button>
            <button onclick="download('txt')">메모장 저장</button>
            <button class="btn-word" onclick="download('doc')">워드 저장</button>
        </div>
    </div>

    <div style="width:100%; max-width:850px; margin-top:40px;">
        <h3>📜 최근 변환 기록</h3>
        <div id="history-list"></div>
    </div>

    <canvas id="pdf-canvas"></canvas>

    <script>
        // [필독] 여기에 본인의 바른 AI REST API 키를 넣으세요!
        const BAREUN_API_KEY = 'koba-FBLMLOA-OTGEVHQ-V3SGL2Q-6H2KQPQ'; 

        const resultArea = document.getElementById('result');
        const statusText = document.getElementById('status');
        const barFill = document.getElementById('bar-fill');
        const progressBox = document.getElementById('progress-box');
        let fullText = "";

        window.onload = updateHistoryUI;

        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            progressBox.style.display = 'block';
            resultArea.value = '';
            fullText = "";

            if (file.type === "application/pdf") {
                await handlePDF(file);
            } else {
                await runOCR(file, 1, 1);
            }

            resultArea.value = fullText;
            statusText.innerText = "1차 인식 완료! 이제 초록색 'AI 띄어쓰기 교정' 버튼을 꼭 눌러주세요!";
        };

        async function runOCR(source, current, total) {
            statusText.innerText = `[${current}/${total}] 글자 분석 중...`;
            const worker = await Tesseract.createWorker('kor+eng');
            const { data: { text } } = await worker.recognize(source);
            
            // 띄어쓰기 해결을 위한 1차 처리: 한글 사이의 모든 공백을 제거하여 AI가 판단하게 함
            const processed = text
                .replace(/([가-힣])\s+(?=[가-힣])/g, '$1') // 한글 사이 공백 강제 제거
                .replace(/\n/g, ' ')                      // 줄바꿈 공백화
                .replace(/\s+/g, ' ')                     // 중복 공백 제거
                .trim();

            fullText += (total > 1 ? `\n[Page ${current}]\n${processed}\n` : processed);
            barFill.style.width = `${(current / total) * 100}%`;
            await worker.terminate();
        }

        async function handlePDF(file) {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.5 });
                const canvas = document.getElementById('pdf-canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                await runOCR(canvas.toDataURL('image/png'), i, pdf.numPages);
            }
        }

        async function fixSpacingWithAI() {
            const text = resultArea.value;
            if (!text || BAREUN_API_KEY.includes('YOUR')) return alert("API 키를 확인해주세요!");

            statusText.innerText = "바른 AI가 문맥을 읽고 띄어쓰기를 마법처럼 교정하고 있습니다...";
            
            try {
                const response = await fetch('https://api.bareun.ai/v1/spellcheck', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': BAREUN_API_KEY },
                    body: JSON.stringify({ document: text })
                });

                const data = await response.json();
                if (data.sentences) {
                    const fixed = data.sentences.map(s => s.text).join('\n');
                    resultArea.value = fixed;
                    statusText.innerText = "AI 띄어쓰기 교정 끗! 🐥✨";
                    saveHistory(fixed);
                }
            } catch (err) {
                alert("API 연동에 실패했습니다. 키와 도메인 허용 설정을 확인하세요.");
            }
        }

        function saveHistory(text) {
            let h = JSON.parse(localStorage.getItem('tt_history') || '[]');
            h.unshift({ id: Date.now(), date: new Date().toLocaleString(), content: text });
            localStorage.setItem('tt_history', JSON.stringify(h.slice(0, 5)));
            updateHistoryUI();
        }

        function updateHistoryUI() {
            const h = JSON.parse(localStorage.getItem('tt_history') || '[]');
            document.getElementById('history-list').innerHTML = h.map(i => `
                <div class="history-item">
                    <div style="cursor:pointer; flex:1" onclick="document.getElementById('result').value=\`${i.content}\` ">
                        <small style="color:#999">${i.date}</small>
                        <div style="font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:600px;">${i.content}</div>
                    </div>
                </div>
            `).join('');
        }

        function download(type) {
            const blob = type === 'txt' ? new Blob([resultArea.value], {type:"text/plain;charset=utf-8"}) : new Blob(['\ufeff'+resultArea.value], {type:'application/msword'});
            saveAs(blob, `뚱땅결과_${Date.now()}.${type}`);
        }
    </script>
</body>
</html>
