<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🐣뚱땅하면 변환 끗🐥</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --main: #007bff; --dark: #003366; }
        body { font-family: 'Pretendard', sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .drop-zone { border: 2px dashed var(--main); background: #f0f7ff; padding: 40px; border-radius: 15px; text-align: center; cursor: pointer; }
        textarea { width: 100%; height: 350px; margin-top: 20px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; line-height: 1.8; resize: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; background: var(--main); }
        .btn-fix { background: #28a745; } /* 띄어쓰기 버튼 */
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>🐣뚱땅하면 변환 끗🐥</h1>
    <div class="container">
        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>📄 이미지/PDF 파일을 업로드해 주새요! </p>
            <input type="file" id="file-input" hidden accept="image/*, application/pdf">
        </div>
        <div id="status" style="margin-top:10px; color:#666; text-align:center;">변환 가보자고🔥</div>
        <textarea id="result"></textarea>
        <div class="btn-group">
            <button class="btn-fix" onclick="smartFix()">🪄 띄어쓰기 교정</button>
            <button onclick="download()">💾 파일로 저장</button>
        </div>
    </div>

    <canvas id="pdf-canvas"></canvas>

    <script>
        const resultArea = document.getElementById('result');
        const status = document.getElementById('status');
        let worker = null;

        // 1. OCR 인식 (속도 최적화 버전)
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            status.innerText = "열심히 읽는 중... (잠시만 기다려주세요)";
            
            if (!worker) worker = await Tesseract.createWorker('kor+eng');
            const { data: { text } } = await worker.recognize(file);
            
            // 1차 기본 정제
            resultArea.value = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
            status.innerText = "읽기 완료! '마법 교정'을 눌러 띄어쓰기를 잡아보세요.";
        };

        // 2. 핵심: API 없이 띄어쓰기 잡아주는 알고리즘
        function smartFix() {
            let text = resultArea.value;
            if(!text) return;

            status.innerText = "문맥 분석 및 교정 중...";

            const fixed = text
                .replace(/([가-힣])\s+(?=[가-힣][가-힣\s]*[.!?])/g, '$1') // 문장 끝 전까지 불필요한 공백 제거
                .replace(/([가-힣]{2,})\s+(이|가|을|를|은|는|도|에|의|로|으로)/g, '$1$2') // 조사 붙이기
                .replace(/([.!?])\s*/g, '$1\n') // 마침표 기준으로 문장 나누기
                .replace(/\n\s+/g, '\n'); // 줄바꿈 후 공백 제거

            resultArea.value = fixed;
            status.innerText = "교정 끗! 🐥✨";
        }

        function download() {
            const blob = new Blob([resultArea.value], {type:"text/plain;charset=utf-8"});
            saveAs(blob, `뚱땅결과_${Date.now()}.txt`);
        }
    </script>
</body>
</html>
