<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐣뚱땅하면 변환 끗🐥</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --main-blue: #007bff;
            --dark-blue: #003366;
            --success-green: #28a745;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { color: var(--dark-blue); font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }

        .container {
            width: 100%; max-width: 850px;
            background: #fff; padding: 30px;
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .drop-zone {
            border: 2px dashed var(--main-blue);
            background: #f0f7ff; padding: 50px;
            border-radius: 15px; text-align: center;
            cursor: pointer; transition: 0.3s;
        }

        .drop-zone:hover { background: #e1efff; }

        .progress-box { display: none; margin: 20px 0; }
        .bar-bg { width: 100%; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--main-blue); transition: 0.3s; }

        textarea {
            width: 100%; height: 350px; margin-top: 20px;
            padding: 20px; border: 1px solid #ddd;
            border-radius: 15px; font-size: 16px; line-height: 1.8;
            box-sizing: border-box; resize: vertical; outline: none;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        button {
            padding: 15px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            color: white; transition: 0.2s;
        }

        .btn-ai { background: var(--success-green); grid-column: span 2; margin-bottom: 5px; }
        .btn-txt { background: var(--main-blue); }
        .btn-word { background: var(--dark-blue); }
        
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* 히스토리 섹션 */
        .history-section { width: 100%; max-width: 850px; margin-top: 50px; }
        .history-item {
            background: white; padding: 15px; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-info { cursor: pointer; flex: 1; }
        .history-date { font-size: 12px; color: #999; }
        .history-preview { font-size: 14px; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }
        .del-btn { background: #ff4d4d; width: auto; padding: 5px 10px; font-size: 12px; margin-left: 10px; }

        canvas { display: none; }
    </style>
</head>
<body>

    <h1>🐣뚱땅하면 변환 끗🐥</h1>
    <p class="subtitle">이미지/PDF를 올리고 AI로 완벽한 띄어쓰기를 경험하세요!</p>

    <div class="container">
        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>📄 파일을 여기에 끌어다 놓거나 클릭하세요</p>
            <input type="file" id="file-input" hidden accept="image/*, application/pdf">
        </div>

        <div class="progress-box" id="progress-box">
            <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
            <p id="status" style="text-align:center; font-size:14px; color:#666; margin-top:10px;">파일 대기 중...</p>
        </div>

        <textarea id="result" placeholder="인식된 결과가 여기에 나타납니다."></textarea>

        <div class="btn-group">
            <button class="btn-ai" onclick="fixSpacingWithAI()">✨ AI 띄어쓰기 정밀 교정 (강력 추천)</button>
            <button class="btn-txt" onclick="download('txt')">TXT로 저장</button>
            <button class="btn-word" onclick="download('doc')">워드로 저장</button>
        </div>
    </div>

    <div class="history-section">
        <h3>📜 최근 변환 기록</h3>
        <div id="history-list"></div>
    </div>

    <canvas id="pdf-canvas"></canvas>

    <script>
        // --- 설정 영역 ---
        const BAREUN_API_KEY = 'koba-FBLMLOA-OTGEVHQ-V3SGL2Q-6H2KQPQ'; // 발급받은 키를 여기에 넣으세요!
        // ----------------

        const resultArea = document.getElementById('result');
        const statusText = document.getElementById('status');
        const progressBox = document.getElementById('progress-box');
        const barFill = document.getElementById('bar-fill');
        const historyList = document.getElementById('history-list');

        let accumulatedText = "";

        window.onload = loadHistory;

        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            progressBox.style.display = 'block';
            resultArea.value = '';
            accumulatedText = "";
            barFill.style.width = '0%';

            if (file.type === "application/pdf") {
                await processPDF(file);
            } else {
                await processImage(file, 1, 1);
            }

            resultArea.value = accumulatedText;
            saveToHistory(accumulatedText);
            statusText.innerText = "모든 변환이 끝났습니다! AI 교정 버튼을 눌러보세요.";
            barFill.style.width = '100%';
        };

        // 이미지 처리 (OCR)
        async function processImage(source, current, total) {
            statusText.innerText = `[${current}/${total}] 글자를 읽고 있습니다...`;
            const worker = await Tesseract.createWorker('kor+eng');
            
            const { data: { text } } = await worker.recognize(source);
            const cleaned = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
            
            if (total > 1) {
                accumulatedText += `\n[Page ${current}]\n${cleaned}\n`;
            } else {
                accumulatedText += cleaned;
            }

            barFill.style.width = `${(current / total) * 100}%`;
            await worker.terminate();
        }

        // PDF 처리
        async function processPDF(file) {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            const total = pdf.numPages;

            for (let i = 1; i <= total; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.5 }); // 고해상도 설정
                const canvas = document.getElementById('pdf-canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                await processImage(canvas.toDataURL('image/png'), i, total);
            }
        }

        // 바른 AI 띄어쓰기 교정
        async function fixSpacingWithAI() {
            const text = resultArea.value;
            if (!text || BAREUN_API_KEY.includes('YOUR')) return alert("API 키를 확인해주세요!");

            statusText.innerText = "AI가 문맥을 분석하여 띄어쓰기를 완벽하게 교정 중입니다...";
            
            try {
                const response = await fetch('https://api.bareun.ai/v1/spellcheck', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': BAREUN_API_KEY },
                    body: JSON.stringify({ document: text })
                });

                const data = await response.json();
                if (data.sentences) {
                    const fixed = data.sentences.map(s => s.text).join('\n');
                    resultArea.value = fixed;
                    statusText.innerText = "AI 교정 끗! 🐥✨";
                    saveToHistory(fixed);
                }
            } catch (err) {
                alert("교정 실패: API 설정을 확인하세요.");
            }
        }

        // 히스토리 관리
        function saveToHistory(text) {
            let history = JSON.parse(localStorage.getItem('tt_history') || '[]');
            const newItem = { id: Date.now(), date: new Date().toLocaleString(), content: text };
            history.unshift(newItem);
            localStorage.setItem('tt_history', JSON.stringify(history.slice(0, 10)));
            loadHistory();
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('tt_history') || '[]');
            historyList.innerHTML = history.map(h => `
                <div class="history-item">
                    <div class="history-info" onclick="document.getElementById('result').value = \`${h.content}\`">
                        <div class="history-date">${h.date}</div>
                        <div class="history-preview">${h.content}</div>
                    </div>
                    <button class="del-btn" onclick="deleteHistory(${h.id})">삭제</button>
                </div>
            `).join('');
        }

        function deleteHistory(id) {
            let history = JSON.parse(localStorage.getItem('tt_history') || '[]');
            localStorage.setItem('tt_history', JSON.stringify(history.filter(h => h.id !== id)));
            loadHistory();
        }

        function download(type) {
            const blob = type === 'txt' ? new Blob([resultArea.value], {type:"text/plain;charset=utf-8"}) : new Blob(['\ufeff'+resultArea.value], {type:'application/msword'});
            saveAs(blob, `뚱땅결과_${Date.now()}.${type}`);
        }
    </script>
</body>
</html>
