<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐣뚱땅하면 변환 끗🐥</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg-color: #ffffff;
            --main-blue: #4a90e2;
            --dark-blue: #1a4a8e;
            --light-blue: #f0f7ff;
            --accent-yellow: #fff9c4;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            color: var(--dark-blue);
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #fff;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 1px solid #eee;
        }

        /* 파일 업로드 영역 */
        .drop-zone {
            border: 2px dashed var(--main-blue);
            background: var(--light-blue);
            padding: 50px 20px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .drop-zone:hover {
            background: #e1efff;
            border-color: var(--dark-blue);
        }

        .drop-zone p {
            margin: 0;
            color: var(--dark-blue);
            font-weight: 600;
        }

        /* 진행 상태 바 */
        .progress-container {
            display: none;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--main-blue);
            transition: width 0.3s ease;
        }

        /* 결과창 */
        #result-area {
            width: 100%;
            height: 350px;
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 1rem;
            line-height: 1.7;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        #result-area:focus {
            border-color: var(--main-blue);
        }

        /* 버튼 그룹 */
        .btn-group {
            margin-top: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-txt { background-color: var(--main-blue); color: white; }
        .btn-doc { background-color: #2b579a; color: white; }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button:active { transform: translateY(0); }

        .status-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 8px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <h1>🐣뚱땅하면 변환 끗🐥</h1>
    <p class="subtitle">이미지나 PDF를 올리면 텍스트로 뚱땅! 바꿔드려요.</p>

    <div class="container">
        <div class="drop-zone" id="drop-zone">
            <p id="drop-text">📄 파일을 여기에 끌어다 놓거나 클릭하세요</p>
            <input type="file" id="file-input" hidden accept="image/*, application/pdf">
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="status-text" id="status-text">준비 중...</div>
        </div>

        <textarea id="result-area" placeholder="여기에 변환된 결과가 나타납니다."></textarea>

        <div class="btn-group">
            <button class="btn-txt" onclick="downloadFile('txt')">📥 TXT로 받기</button>
            <button class="btn-doc" onclick="downloadFile('doc')">📝 Word로 받기</button>
        </div>
    </div>

    <canvas id="pdf-canvas"></canvas>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultArea = document.getElementById('result-area');
        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');
        const progressContainer = document.getElementById('progress-container');

        // PDF.js 설정
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // 클릭 이벤트
        dropZone.onclick = () => fileInput.click();

        // 드래그 앤 드롭
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--dark-blue)"; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = "var(--main-blue)"; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        };

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        async function handleFile(file) {
            progressContainer.style.display = "block";
            resultArea.value = "";
            
            if (file.type === "application/pdf") {
                await processPDF(file);
            } else {
                await processImage(file);
            }
        }

        // 이미지 OCR 처리
        async function processImage(imageSource) {
            statusText.innerText = "이미지에서 글자를 읽는 중... (잠시만 기다려주세요)";
            const worker = await Tesseract.createWorker('kor+eng', 1, {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        progressFill.style.width = `${m.progress * 100}%`;
                    }
                }
            });

            const { data: { text } } = await worker.recognize(imageSource);
            resultArea.value += cleanText(text);
            
            statusText.innerText = "변환 끗! 🐥";
            await worker.terminate();
        }

        // PDF 처리 (이미지로 변환 후 OCR)
        async function processPDF(file) {
            statusText.innerText = "PDF 분석 중...";
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            
            for (let i = 1; i <= pdf.numPages; i++) {
                statusText.innerText = `PDF ${i} / ${pdf.numPages} 페이지 변환 중...`;
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 }); // 고해상도 렌더링
                const canvas = document.getElementById('pdf-canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                const imageData = canvas.toDataURL('image/png');
                await processImage(imageData);
            }
        }

        // 텍스트 정제 (지능형 띄어쓰기/줄바꿈 보정)
        function cleanText(text) {
            return text
                .replace(/\r?\n|\r/g, " ") // 모든 줄바꿈을 공백으로 (문장 이어붙이기)
                .replace(/\s+/g, " ")       // 중복 공백 제거
                .replace(/([.!?])\s/g, "$1\n") // 마침표 뒤에서만 줄바꿈 (가독성)
                .replace(/([가-힣])\s+(?=[가-힣][가-힣\s]*[.!?])/g, "$1 ") // 한국어 단어 사이 공백 최적화
                .trim();
        }

        // 다운로드 기능
        function downloadFile(type) {
            const content = resultArea.value;
            if (!content) return alert("변환된 내용이 없어요!");

            if (type === 'txt') {
                const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
                saveAs(blob, "뚱땅변환_결과.txt");
            } else {
                const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
                saveAs(blob, "뚱땅변환_결과.doc");
            }
        }
    </script>
</body>
</html>
