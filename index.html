<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐣뚱땅변환기🐥</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --main: #007bff; --dark: #1a1a1a; --green: #2ecc71; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 850px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h1 { color: var(--dark); margin: 10px 0; font-weight: 800; }
        .drop-zone { border: 3px dashed #d1d9e6; background: #f8fbff; padding: 50px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { border-color: var(--main); background: #f0f7ff; }
        
        .progress-box { display: none; margin: 25px 0; }
        .bar-bg { width: 100%; height: 14px; background: #eee; border-radius: 7px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); transition: 0.3s ease; }
        
        textarea { width: 100%; height: 400px; margin-top: 20px; padding: 20px; border-radius: 15px; border: 1px solid #e0e0e0; font-size: 16px; line-height: 1.8; box-sizing: border-box; resize: none; outline: none; background: #fdfdfd; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn-fix { background: var(--green); grid-column: span 2; font-size: 18px; padding: 18px; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        button { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; background: var(--main); transition: 0.2s; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        canvas { display: none; }
    </style>
</head>
<body>

    <h1>🐣 뚱땅하면 변환 끗 🐥</h1>
    <div class="container">
        <div class="drop-zone" onclick="document.getElementById('file-input').click()">
            <p style="font-size: 1.1rem; color: #555;">📄 여기에 이미지/PDF를 업로드해 주세요!</p>
            <input type="file" id="file-input" hidden accept="image/*, application/pdf">
        </div>

        <div class="progress-box" id="progress-box">
            <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
            <p id="status" style="text-align:center; margin-top:10px; font-weight:bold; color: var(--main);">변환 준비 중...</p>
        </div>

        <textarea id="result" placeholder="인식된 텍스트가 여기에 나옵니다."></textarea>

        <div class="btn-group">
            <button class="btn-fix" onclick="superFix()">🪄 띄어쓰기 교정</button>
            <button onclick="download('txt')">메모장(.txt) 저장</button>
            <button style="background:var(--dark)" onclick="download('doc')">워드(.doc) 저장</button>
        </div>
    </div>

    <canvas id="pdf-canvas"></canvas>

    <script>
        const resultArea = document.getElementById('result');
        const statusText = document.getElementById('status');
        const barFill = document.getElementById('bar-fill');
        const progressBox = document.getElementById('progress-box');
        
        let worker = null;

        async function initWorker() {
            if (!worker) {
                statusText.innerText = "업로드 중...";
                worker = await Tesseract.createWorker('kor+eng', 1, {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            const p = Math.round(m.progress * 100);
                            barFill.style.width = p + '%';
                            statusText.innerText = `AI 모델 로드 중... ${p}%`;
                        }
                    }
                });
            }
            return worker;
        }

        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            progressBox.style.display = 'block';
            resultArea.value = '';
            
            if (file.type === "application/pdf") {
                await processPDF(file);
            } else {
                await doOCR(file);
            }
            statusText.innerText = "인식 완료! 이제 '띄어쓰기 교정' 버튼을 누르세요!";
        };

        async function doOCR(src) {
            const w = await initWorker();
            const { data: { text } } = await w.recognize(src);
            resultArea.value += text;
        }

        async function processPDF(file) {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.5 });
                const canvas = document.getElementById('pdf-canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                await doOCR(canvas.toDataURL('image/png'));
            }
        }

        // ⭐ 초강력 자체 교정 엔진 (v2.0)
        function superFix() {
            let text = resultArea.value;
            if(!text) return;

            statusText.innerText = "띄어쓰기 교정 중...";

            const improved = text
                // 1. 단어 사이가 한 글자씩 벌어진 경우 강제 결합 (가 나 다 -> 가나다)
                .replace(/([가-힣])\s(?=[가-힣]\s)/g, '$1')
                
                // 2. 단어 중간에 어설프게 들어간 줄바꿈 제거 (문맥 연결)
                .replace(/([가-힣])\n(?=[가-힣])/g, '$1')
                
                // 3. 조사 앞 공백 제거 (학교 에 -> 학교에)
                .replace(/([가-힣])\s+(은|는|이|가|을|를|의|에|로|으로|와|과|도|만|나|이나|서|에서|에게|께)/g, '$1$2')
                
                // 4. 어미 결합 (먹 었다 -> 먹었다, 하 고 -> 하고)
                .replace(/([가-힣])\s+(다|고|어|아|게|지|니|냐|며|면|자|구나|군요|네요|어라|아라|니까|어서|아서)/g, '$1$2')
                
                // 5. 숫자와 단위 붙이기 (10 개 -> 10개, 5 명 -> 5명)
                .replace(/(\d+)\s+(개|명|번|세|살|원|층|시|분|초|kg|g|m|cm|km)/g, '$1$2')
                
                // 6. 마침표/쉼표 앞 공백 제거
                .replace(/\s+([.,!?])/g, '$1')
                
                // 7. 중복 공백 및 불필요한 공백 정리
                .replace(/\n+/g, '\n')
                .replace(/[ ]+/g, ' ')
                .trim();

            resultArea.value = improved;
            statusText.innerText = "✨교정 완료✨";
        }

        function download(type) {
            const blob = type === 'txt' ? new Blob([resultArea.value], {type:"text/plain;charset=utf-8"}) : new Blob(['\ufeff'+resultArea.value], {type:'application/msword'});
            saveAs(blob, `뚱땅결과_${Date.now()}.${type}`);
        }
    </script>
</body>
</html>
